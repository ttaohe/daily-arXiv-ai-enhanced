name: arXiv-daily-ai-enhanced

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Target arXiv submission date (YYYY-MM-DD). Leave empty for UTC today.'
        required: false
        type: string
      max_results:
        description: 'Max arXiv API results to scan'
        required: false
        default: '500'
        type: string
      threshold:
        description: 'LLM relevance threshold'
        required: false
        default: '7'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"
          uv sync

      - name: Resolve target date
        id: params
        run: |
          target_date="${{ github.event.inputs.target_date }}"
          if [ -z "$target_date" ]; then
            target_date=$(date -u "+%Y-%m-%d")
          fi
          max_results="${{ github.event.inputs.max_results }}"
          if [ -z "$max_results" ]; then
            max_results=500
          fi
          threshold="${{ github.event.inputs.threshold }}"
          if [ -z "$threshold" ]; then
            threshold=7
          fi
          echo "target_date=$target_date" >> "$GITHUB_OUTPUT"
          echo "max_results=$max_results" >> "$GITHUB_OUTPUT"
          echo "threshold=$threshold" >> "$GITHUB_OUTPUT"
          echo "Using target_date=$target_date max_results=$max_results threshold=$threshold"

      - name: Build inference-optimization dataset
        run: |
          source .venv/bin/activate
          cd ai
          export OPENAI_API_KEY='${{ secrets.OPENAI_API_KEY }}'
          export OPENAI_BASE_URL='${{ secrets.OPENAI_BASE_URL }}'
          export MODEL_NAME='${{ vars.MODEL_NAME }}'
          python build_infra_dataset.py \
            --date '${{ steps.params.outputs.target_date }}' \
            --max-results '${{ steps.params.outputs.max_results }}' \
            --threshold '${{ steps.params.outputs.threshold }}' \
            --output '../data/${{ steps.params.outputs.target_date }}.jsonl'

      - name: AI enhancement processing
        run: |
          source .venv/bin/activate
          cd ai
          export OPENAI_API_KEY='${{ secrets.OPENAI_API_KEY }}'
          export OPENAI_BASE_URL='${{ secrets.OPENAI_BASE_URL }}'
          export LANGUAGE='${{ vars.LANGUAGE }}'
          export MODEL_NAME='${{ vars.MODEL_NAME }}'
          python enhance.py --data '../data/${{ steps.params.outputs.target_date }}.jsonl'

      - name: Update file list
        run: |
          find data -maxdepth 1 -type f \( -name '*_AI_enhanced_Chinese.jsonl' -o -name '*_AI_enhanced_English.jsonl' \) \
            | sed 's|data/||' | sort -r > assets/file-list.txt
          echo 'Updated assets/file-list.txt:'
          cat assets/file-list.txt

      - name: Inject repository info into data-config.js
        run: |
          REPO_OWNER='${{ github.repository_owner }}'
          REPO_NAME='${{ github.event.repository.name }}'
          sed -i "s/PLACEHOLDER_REPO_OWNER/${REPO_OWNER}/g" js/data-config.js
          sed -i "s/PLACEHOLDER_REPO_NAME/${REPO_NAME}/g" js/data-config.js

      - name: Commit code changes to main branch
        run: |
          git config --global user.email '${{ vars.EMAIL }}'
          git config --global user.name '${{ vars.NAME }}'
          git checkout main
          git add .github/workflows/run.yml js/data-config.js ai/build_infra_dataset.py .gitignore
          if git diff --staged --quiet; then
            echo 'No code changes to commit'
          else
            git commit -m 'chore: align inference dataset workflow'
            git push origin main
          fi

      - name: Prepare and push data branch
        run: |
          git config --global user.email '${{ vars.EMAIL }}'
          git config --global user.name '${{ vars.NAME }}'
          mkdir -p /tmp/data_files/data /tmp/data_files/assets
          cp -r data/* /tmp/data_files/data/ 2>/dev/null || true
          cp assets/file-list.txt /tmp/data_files/assets/file-list.txt

          git fetch origin data:data || true
          if git show-ref --verify --quiet refs/heads/data; then
            git checkout data
            git pull origin data --rebase || true
          else
            git checkout --orphan data
            git rm -rf --cached . 2>/dev/null || true
            mkdir -p data assets
            echo '# Data Branch' > README.md
            git add README.md
            git commit -m 'chore: initialize data branch'
            git push origin data
          fi

          mkdir -p data assets
          cp -r /tmp/data_files/data/* data/ 2>/dev/null || true
          cp /tmp/data_files/assets/file-list.txt assets/file-list.txt

          git add -f data/*.jsonl assets/file-list.txt
          if git diff --staged --quiet; then
            echo 'No data changes to commit'
          else
            git commit -m "update: ${{ steps.params.outputs.target_date }} inference papers"
            git push origin data
          fi
