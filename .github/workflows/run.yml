name: arXiv-daily-ai-enhanced

on:
  schedule:
    # 08:00 Asia/Shanghai = 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Single target date (YYYY-MM-DD)'
        required: false
        type: string
      start_date:
        description: 'Backfill start date (YYYY-MM-DD)'
        required: false
        type: string
      end_date:
        description: 'Backfill end date (YYYY-MM-DD)'
        required: false
        type: string
      max_results:
        description: 'Max arXiv API results to scan'
        required: false
        default: '500'
        type: string
      threshold:
        description: 'LLM relevance threshold'
        required: false
        default: '7'
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="$HOME/.local/bin:$PATH"
          uv sync

      - name: Resolve date range
        id: params
        shell: bash
        run: |
          target_date="${{ github.event.inputs.target_date }}"
          start_date="${{ github.event.inputs.start_date }}"
          end_date="${{ github.event.inputs.end_date }}"
          max_results="${{ github.event.inputs.max_results }}"
          threshold="${{ github.event.inputs.threshold }}"

          if [ -z "$max_results" ]; then
            max_results=500
          fi
          if [ -z "$threshold" ]; then
            threshold=7
          fi

          if [ -n "$target_date" ]; then
            resolved_start="$target_date"
            resolved_end="$target_date"
          elif [ -n "$start_date" ] && [ -n "$end_date" ]; then
            resolved_start="$start_date"
            resolved_end="$end_date"
          else
            resolved_start=$(TZ=Asia/Shanghai date -d 'yesterday' '+%Y-%m-%d')
            resolved_end="$resolved_start"
          fi

          echo "start_date=$resolved_start" >> "$GITHUB_OUTPUT"
          echo "end_date=$resolved_end" >> "$GITHUB_OUTPUT"
          echo "max_results=$max_results" >> "$GITHUB_OUTPUT"
          echo "threshold=$threshold" >> "$GITHUB_OUTPUT"
          echo "Resolved range: $resolved_start -> $resolved_end"

      - name: Generate datasets and AI-enhanced files
        shell: bash
        run: |
          mkdir -p data assets
          source .venv/bin/activate

          export OPENAI_API_KEY='${{ secrets.OPENAI_API_KEY }}'
          export OPENAI_BASE_URL='${{ secrets.OPENAI_BASE_URL }}'
          export LANGUAGE='${{ vars.LANGUAGE }}'
          export MODEL_NAME='${{ vars.MODEL_NAME }}'

          current='${{ steps.params.outputs.start_date }}'
          end='${{ steps.params.outputs.end_date }}'

          while [ "$(date -d "$current" +%s)" -le "$(date -d "$end" +%s)" ]; do
            echo "=== Processing $current ==="
            (
              cd ai
              python build_infra_dataset.py \
                --date "$current" \
                --max-results '${{ steps.params.outputs.max_results }}' \
                --threshold '${{ steps.params.outputs.threshold }}' \
                --output "../data/${current}.jsonl"
              python enhance.py --data "../data/${current}.jsonl"
            )
            current=$(date -d "$current +1 day" '+%Y-%m-%d')
          done

      - name: Update file list
        shell: bash
        run: |
          mkdir -p assets
          find data -maxdepth 1 -type f \( -name '*_AI_enhanced_Chinese.jsonl' -o -name '*_AI_enhanced_English.jsonl' \) \
            | sed 's|data/||' | sort -r > assets/file-list.txt
          echo 'Updated assets/file-list.txt:'
          cat assets/file-list.txt

      - name: Push generated data to data branch
        shell: bash
        run: |
          git config --global user.email '${{ vars.EMAIL }}'
          git config --global user.name '${{ vars.NAME }}'

          mkdir -p /tmp/data_files/data /tmp/data_files/assets
          cp -r data/* /tmp/data_files/data/ 2>/dev/null || true
          cp assets/file-list.txt /tmp/data_files/assets/file-list.txt

          git fetch origin data:data || true
          if git show-ref --verify --quiet refs/heads/data; then
            git checkout data
            git pull origin data --rebase || true
          else
            git checkout --orphan data
            git rm -rf --cached . 2>/dev/null || true
            mkdir -p data assets
            echo '# Data Branch' > README.md
            git add README.md
            git commit -m 'chore: initialize data branch'
            git push origin data
          fi

          mkdir -p data assets
          cp -r /tmp/data_files/data/* data/ 2>/dev/null || true
          cp /tmp/data_files/assets/file-list.txt assets/file-list.txt

          git add -f data/*.jsonl assets/file-list.txt
          if git diff --staged --quiet; then
            echo 'No data changes to commit'
          else
            git commit -m "update: ${{ steps.params.outputs.start_date }} to ${{ steps.params.outputs.end_date }} inference papers"
            git push origin data
          fi
